name: Continuous Deployment

on: 
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Select the environment to deploy to
        default: Staging
        options: 
        - Staging
        - Production
 
permissions:
  contents: write
  packages: write
  repository-projects: write
  id-token: write
  pull-requests: read

jobs:

  version:
    uses: codedesignplus/workflows/.github/workflows/release.yaml@main
    with:
      project-name: CodeDesignPlus.Net.Microservice.Rbac
      microservice-name: ms-rbac
      environment: ${{ github.event.inputs.environment }}
    secrets: inherit

  container:
    needs: version
    uses: codedesignplus/workflows/.github/workflows/container-image.yaml@main
    with:
      project-name: CodeDesignPlus.Net.Microservice.Rbac
      microservice-name: ms-rbac
      environment: ${{ github.event.inputs.environment }}
    secrets: inherit
  
  deploy:
    needs: container
    uses: codedesignplus/workflows/.github/workflows/deploy-self-host.yaml@main
    with:
      project-name: CodeDesignPlus.Net.Microservice.Rbac
      microservice-name: ms-rbac
      enable-rest: true
      enable-grpc: false
      enable-worker: false
      environment: ${{ github.event.inputs.environment }}
    secrets: inherit